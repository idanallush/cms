<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Console</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <svg width="18" height="16" viewBox="0 0 76 65" fill="none"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="currentColor"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Agency Console</span>
          <span class="brand-sub">AI CMS</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item active">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Sites
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-label">Integrations</div>
      <div class="sidebar-integrations">
        <button class="integration-item" data-manage="ai">
          <span class="integration-dot" id="dot-ai"></span>
          <span class="integration-name">AI Editing</span>
          <span class="integration-badge" id="ai-badge">--</span>
        </button>
        <button class="integration-item" data-manage="vercel">
          <span class="integration-dot" id="dot-vercel"></span>
          <span class="integration-name">Vercel</span>
          <span class="integration-badge" id="vercel-badge">--</span>
        </button>
        <button class="integration-item" data-manage="db">
          <span class="integration-dot" id="dot-db"></span>
          <span class="integration-name">Database</span>
          <span class="integration-badge" id="db-badge">--</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <a href="/logout" class="sidebar-logout">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <div class="header-text">
          <h1>Sites</h1>
          <p class="header-sub">Manage your client websites</p>
        </div>
        <button id="btn-add-site" class="btn-add-site">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add site
        </button>
      </header>

      <!-- Ingest Section (hidden by default) -->
      <section id="ingest-section" class="ingest-section hidden">
        <div class="ingest-inner">
          <div class="ingest-header">
            <h2 class="ingest-title">Add a new website</h2>
            <button id="btn-close-ingest" class="btn-close-ingest">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <form id="ingest-form" class="ingest-form">
            <div class="ingest-fields">
              <input type="text" id="ingest-name" placeholder="Site name" class="input">
              <div class="ingest-url-row">
                <input type="text" id="ingest-url" placeholder="https://example.com" class="input input-grow">
                <button type="submit" id="btn-ingest" class="btn-ingest">Ingest</button>
              </div>
              <textarea id="ingest-html" class="input textarea" rows="3" placeholder="...or paste HTML directly"></textarea>
            </div>
          </form>
          <div id="ingest-status" class="ingest-status hidden"></div>
        </div>
      </section>

      <!-- Sites Grid -->
      <div id="sites-grid" class="sites-grid">
        <div class="sites-loading">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <!-- Empty state (hidden, shown by JS when no sites) -->
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button id="modal-close" class="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modal-tabs-container" class="modal-tabs" style="display:none;"></div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/js/cms-utils.js"></script>
  <script src="/js/dashboard-core.js"></script>
  <script src="/js/dashboard-config.js"></script>
  <script src="/js/dashboard-sites.js"></script>
  <script src="/js/dashboard-ingest.js"></script>
</body>
</html>
