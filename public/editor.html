<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - Client CMS</title>
  <link rel="stylesheet" href="/css/editor.css">
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-left">
      <span id="site-name" class="toolbar-site-name">Loading...</span>
      <a id="site-url" class="toolbar-site-url" href="#" target="_blank" rel="noopener"></a>
    </div>
    <div class="toolbar-center">
      <span id="changes-indicator" class="changes-indicator hidden">0 unsaved changes</span>
    </div>
    <div class="toolbar-right">
      <button id="btn-chat" class="toolbar-btn btn-ai" title="AI Chat">AI</button>
      <button id="btn-save" class="toolbar-btn btn-primary" disabled>
        Save
        <span id="save-badge" class="save-badge hidden">0</span>
      </button>
      <button id="btn-publish" class="toolbar-btn btn-publish">Publish</button>
      <button id="btn-history" class="toolbar-btn btn-secondary">History</button>
      <button id="btn-preview" class="toolbar-btn btn-secondary">Preview</button>
    </div>
  </div>

  <div id="editor-body">
    <iframe id="site-iframe" sandbox="allow-same-origin"></iframe>

    <div id="history-panel" class="history-panel hidden">
      <div class="history-header">
        <h3>Version History</h3>
        <button id="btn-close-history" class="history-close">&times;</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <!-- AI Chat Panel -->
    <div id="chat-panel" class="chat-panel hidden">
      <div class="chat-header">
        <h3>AI Assistant</h3>
        <button id="btn-close-chat" class="history-close">&times;</button>
      </div>
      <div id="chat-messages" class="chat-messages">
        <div class="chat-msg chat-msg-system">
          Tell me what you'd like to change on the site. For example: "Change the main heading to Welcome" or "Update the phone number to 050-1234567"
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Describe what to change..." maxlength="2000">
        <button id="btn-send-chat" class="toolbar-btn btn-primary">Send</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Publish status bar -->
  <div id="publish-bar" class="publish-bar hidden">
    <span id="publish-status-text"></span>
    <a id="publish-link" href="#" target="_blank" rel="noopener" class="hidden">View live site</a>
  </div>

  <!-- Image edit popover -->
  <div id="popover-image" class="popover hidden">
    <h4>Edit Image</h4>
    <label>Image URL</label>
    <input type="text" id="popover-img-src" placeholder="https://...">
    <label>Alt Text</label>
    <input type="text" id="popover-img-alt" placeholder="Image description">
    <div class="popover-actions">
      <button id="popover-img-apply" class="toolbar-btn btn-primary">Apply</button>
      <button id="popover-img-cancel" class="toolbar-btn btn-secondary">Cancel</button>
    </div>
  </div>

  <!-- Link edit popover -->
  <div id="popover-link" class="popover hidden">
    <h4>Edit Link</h4>
    <label>Link Text</label>
    <input type="text" id="popover-link-text" placeholder="Click here">
    <label>URL</label>
    <input type="text" id="popover-link-href" placeholder="https://...">
    <div class="popover-actions">
      <button id="popover-link-apply" class="toolbar-btn btn-primary">Apply</button>
      <button id="popover-link-cancel" class="toolbar-btn btn-secondary">Cancel</button>
    </div>
  </div>

  <script src="/js/editor.js"></script>
</body>
</html>
