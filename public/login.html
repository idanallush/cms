<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI CMS</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 76 65" fill="none"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="#fff"/></svg>
      </div>
      <h1 id="auth-title">AI CMS</h1>
      <p id="auth-subtitle" class="auth-subtitle">Enter your password to continue</p>

      <form id="login-form">
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" required autofocus>
        </div>
        <div id="error-msg" class="error-msg hidden"></div>
        <button type="submit" id="btn-login" class="btn-login">Unlock editor</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const pathParts = window.location.pathname.split('/login/');
      const siteId = pathParts[1] || null;
      const form = document.getElementById('login-form');
      const passwordInput = document.getElementById('password');
      const errorMsg = document.getElementById('error-msg');
      const title = document.getElementById('auth-title');
      const subtitle = document.getElementById('auth-subtitle');
      const btnLogin = document.getElementById('btn-login');

      if (siteId) {
        fetch('/api/public/site/' + siteId)
          .then(r => {
            if (!r.ok) throw new Error();
            return r.json();
          })
          .then(meta => {
            const displayName = meta.clientDisplayName || meta.name || 'Your Site';
            title.textContent = displayName + ' \u{1F44B}';
            subtitle.textContent = 'Enter the password to edit ' + (meta.name || 'this site') + '.';
          })
          .catch(() => {
            title.textContent = 'Site Login';
          });
      } else {
        title.textContent = 'Agency Console';
        subtitle.textContent = 'Owner Login';
        btnLogin.textContent = 'Login';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.classList.add('hidden');
        btnLogin.disabled = true;
        btnLogin.textContent = 'Logging in...';

        const password = passwordInput.value;
        const endpoint = siteId
          ? '/api/auth/login/client'
          : '/api/auth/login/owner';
        const body = siteId
          ? { siteId, password }
          : { password };

        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();

          if (res.ok && data.success) {
            window.location.href = siteId ? '/editor/?site=' + siteId : '/dashboard';
          } else {
            errorMsg.textContent = data.error?.message || 'Login failed';
            errorMsg.classList.remove('hidden');
          }
        } catch (err) {
          errorMsg.textContent = 'Connection error';
          errorMsg.classList.remove('hidden');
        } finally {
          btnLogin.disabled = false;
          btnLogin.textContent = siteId ? 'Unlock editor' : 'Login';
        }
      });
    })();
  </script>
</body>
</html>
